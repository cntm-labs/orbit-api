name: Build & Push Docker Images to GHCR

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'api.Dockerfile'
      - 'docs/**'
      - 'docs.Dockerfile'
      - '.github/workflows/docker-publish.yml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/cntm-labs/orbit-api
  DOCS_IMAGE: ghcr.io/cntm-labs/orbit-docs

jobs:
  build-api:
    name: Build & Push orbit-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push orbit-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-docs:
    name: Build & Push orbit-docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: maven

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build API and generate OpenAPI spec
        run: |
          ./mvnw clean package -DskipTests -q
          nohup ./mvnw spring-boot:run -Dspring-boot.run.profiles=test &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/v3/api-docs > /dev/null 2>&1 && break
            sleep 5
          done
          curl -sf -H "Accept: application/json" http://localhost:8080/v3/api-docs > docs/public/openapi.json

      - name: Build Next.js static export
        working-directory: ./docs
        run: bun install && bun run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCS_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push orbit-docs
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docs.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
