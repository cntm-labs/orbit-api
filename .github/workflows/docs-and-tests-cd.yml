name: CI & Docs Pipeline (Tests, Coverage, API Docs)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-coverage:
    name: Run Tests & Upload Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: maven

      - name: Run Maven Tests
        run: ./mvnw clean test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: cntm-labs/orbit-api

  generate-and-publish-docs:
    name: Build Next.js Docs & Publish to GH Pages
    runs-on: ubuntu-latest
    needs: [test-and-coverage]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: maven

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Application
        run: ./mvnw clean package -DskipTests

      - name: Start Application in Background
        run: |
          nohup ./mvnw spring-boot:run -Dspring-boot.run.profiles=test &
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/v3/api-docs > /dev/null 2>&1; then
              echo "App is up!"
              break
            fi
            sleep 5
          done

      - name: Download OpenAPI JSON
        run: |
          curl -sf -H "Accept: application/json" http://localhost:8080/v3/api-docs > docs/public/openapi.json
          echo "Downloaded openapi.json ($(wc -c < docs/public/openapi.json) bytes)"

      - name: Verify API Documentation Coverage
        # Run our custom script to ensure the OpenAPI JSON actually captured the endpoints
        run: ./scripts/verify-docs.sh

      - name: Install Next.js Dependencies
        working-directory: ./docs
        run: bun install

      - name: Build Next.js Static Export
        working-directory: ./docs
        run: bun run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: './docs/out' # The folder Next.js exports to

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
